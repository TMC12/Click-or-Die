<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Click or Die</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #6c5ce7;
  --primary-light: #a29bfe;
  --accent: #fd79a8;
  --bg: #0a0a1a;
  --text: #ffffff;
  --card-bg: rgba(255,255,255,0.08);
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.3s;
}

/* 语言切换 */
.lang-switch {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 100;
  display: flex;
  gap: 4px;
  background: var(--card-bg);
  border-radius: 20px;
  padding: 4px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.lang-btn {
  padding: 6px 14px;
  border: none;
  border-radius: 16px;
  background: transparent;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.lang-btn.active {
  background: var(--primary);
}

/* 游戏区域 */
.game-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  padding: 20px;
}

/* 倒计时 */
.timer {
  font-size: 48px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--primary-light);
  transition: color 0.3s;
}
.timer.danger {
  color: #ff4444;
  animation: pulse-danger 0.5s ease-in-out infinite;
}

@keyframes pulse-danger {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* 计数器 */
.counter {
  font-size: 72px;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  color: var(--text);
  transition: transform 0.1s, color 0.15s;
  text-shadow: 0 0 30px rgba(108,92,231,0.5);
}
.counter.bump {
  transform: scale(1.15);
  color: var(--accent);
}

/* 大按钮 */
.click-btn {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(145deg, var(--primary), #5a4bd1);
  color: white;
  font-size: 24px;
  font-weight: 700;
  cursor: pointer;
  position: relative;
  transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  box-shadow:
    0 8px 32px rgba(108,92,231,0.4),
    0 0 60px rgba(108,92,231,0.2),
    inset 0 -4px 8px rgba(0,0,0,0.2);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  outline: none;
}
.click-btn:active, .click-btn.pressed {
  transform: scale(0.92);
  box-shadow:
    0 4px 16px rgba(108,92,231,0.3),
    0 0 30px rgba(108,92,231,0.15),
    inset 0 4px 8px rgba(0,0,0,0.3);
}
.click-btn::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.15);
  pointer-events: none;
}
.click-btn:disabled {
  opacity: 0.5;
  cursor: default;
  transform: none;
}

/* 开始/重新测试按钮 */
.start-btn {
  padding: 14px 36px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(145deg, var(--primary), #5a4bd1);
  color: white;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(108,92,231,0.4);
}
.start-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(108,92,231,0.5);
}

/* 结果页面 */
.result-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,10,26,0.92);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 50;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.result-overlay.show {
  display: flex;
}

.result-score {
  font-size: 96px;
  font-weight: 900;
  color: var(--accent);
  animation: score-bounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  text-shadow: 0 0 40px rgba(253,121,168,0.5);
}
@keyframes score-bounce {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

.result-rating {
  font-size: 64px;
  animation: rating-pop 0.5s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes rating-pop {
  0% { transform: scale(0) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

.result-label {
  font-size: 24px;
  font-weight: 600;
  animation: fade-up 0.4s 0.5s both;
}

.result-taunt {
  font-size: 16px;
  color: rgba(255,255,255,0.6);
  max-width: 300px;
  text-align: center;
  line-height: 1.5;
  animation: fade-up 0.4s 0.6s both;
}
@keyframes fade-up {
  0% { transform: translateY(20px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

.result-btn {
  margin-top: 12px;
  padding: 16px 48px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(145deg, var(--accent), #e84393);
  color: white;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(253,121,168,0.4);
  animation: fade-up 0.4s 0.7s both;
}
.result-btn:hover {
  transform: translateY(-2px) scale(1.05);
  box-shadow: 0 6px 28px rgba(253,121,168,0.5);
}

/* 反馈按钮 */
.feedback-link {
  position: fixed;
  bottom: 16px;
  right: 16px;
  z-index: 100;
  padding: 8px 16px;
  border: none;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid rgba(255,255,255,0.1);
}
.feedback-link:hover {
  background: rgba(255,255,255,0.18);
  color: white;
}

/* 粒子画布 */
#particle-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 60;
}

/* 屏幕边缘闪烁 */
.screen-flash {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 40;
  opacity: 0;
  transition: opacity 0.2s;
  box-shadow: inset 0 0 80px 20px rgba(255,0,0,0.6);
  border-radius: 0;
}
.screen-flash.active {
  animation: flash-border 0.5s ease-in-out infinite;
}
@keyframes flash-border {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

/* 背景震动 */
body.shake-light { animation: shake-light 0.18s; }
body.shake-medium { animation: shake-medium 0.18s; }
body.shake-heavy { animation: shake-heavy 0.15s; }

@keyframes shake-light {
  0%, 100% { transform: translate(0); }
  20% { transform: translate(-4px, 2px) rotate(-0.5deg); }
  40% { transform: translate(3px, -3px) rotate(0.5deg); }
  60% { transform: translate(-2px, 1px) rotate(-0.3deg); }
  80% { transform: translate(4px, -1px) rotate(0.3deg); }
}
@keyframes shake-medium {
  0%, 100% { transform: translate(0); }
  20% { transform: translate(-8px, 4px) rotate(-1deg); }
  40% { transform: translate(7px, -6px) rotate(1deg); }
  60% { transform: translate(-5px, 3px) rotate(-0.8deg); }
  80% { transform: translate(6px, -2px) rotate(0.8deg); }
}
@keyframes shake-heavy {
  0%, 100% { transform: translate(0); }
  15% { transform: translate(-14px, 8px) rotate(-2deg); }
  30% { transform: translate(12px, -10px) rotate(1.5deg); }
  45% { transform: translate(-10px, 6px) rotate(-1deg); }
  60% { transform: translate(8px, -12px) rotate(2deg); }
  75% { transform: translate(-6px, 10px) rotate(-1.5deg); }
  90% { transform: translate(4px, -4px) rotate(1deg); }
}

/* 响应式 */
@media (max-width: 480px) {
  .click-btn { width: 160px; height: 160px; font-size: 20px; }
  .counter { font-size: 56px; }
  .timer { font-size: 36px; }
  .result-score { font-size: 72px; }
  .result-rating { font-size: 48px; }
}
</style>
</head>
<body>

<!-- 语言切换 -->
<div class="lang-switch">
  <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">中文</button>
  <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
</div>

<!-- 游戏主区域 -->
<div class="game-container" id="game">
  <div class="timer" id="timer">10</div>
  <div class="counter" id="counter">0</div>
  <button class="click-btn" id="clickBtn" onclick="handleClick(event)" disabled>
    <span data-zh="点击开始" data-en="CLICK TO START">点击开始</span>
  </button>
  <button class="start-btn" id="startBtn" onclick="startGame()">
    <span data-zh="开始测试" data-en="START TEST">开始测试</span>
  </button>
</div>

<!-- 结果覆盖层 -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-score" id="resultScore">0</div>
  <div class="result-rating" id="resultRating"></div>
  <div class="result-label" id="resultLabel"></div>
  <div class="result-taunt" id="resultTaunt"></div>
  <button class="result-btn" onclick="resetGame()">
    <span data-zh="再来一次" data-en="PLAY AGAIN">再来一次</span>
  </button>
</div>

<!-- 屏幕边缘闪烁 -->
<div class="screen-flash" id="screenFlash"></div>

<!-- 粒子画布 -->
<canvas id="particle-canvas"></canvas>

<!-- 反馈按钮 -->
<button class="feedback-link" onclick="copyEmail()" data-zh="📧 联系我" data-en="📧 Contact">📧 联系我</button>

<script>
// ===== 多语言系统 =====
const translations = {
  zh: {
    clickToStart: '点击开始',
    startTest: '开始测试',
    playAgain: '再来一次',
    contact: '📧 联系我',
    copied: '✅ 已复制邮箱地址',
    ratings: [
      { min: 0, max: 50, emoji: '🦥', label: '树懒', taunt: '就这？你朋友平均95次，你确定你用的是手指吗？' },
      { min: 51, max: 80, emoji: '🧑', label: '普通人', taunt: '还行，但你的朋友平均95次。再试试？' },
      { min: 81, max: 100, emoji: '✋', label: '手速不错', taunt: '不错不错，但距离电竞选手还差亿点点' },
      { min: 101, max: 130, emoji: '🎮', label: '电竞选手', taunt: '你朋友平均95次？那你已经超越他们了！' },
      { min: 131, max: 999, emoji: '🐦', label: '你不是人，你是啄木鸟', taunt: '这手速……你确定不是在用震动马达？' }
    ]
  },
  en: {
    clickToStart: 'CLICK TO START',
    startTest: 'START TEST',
    playAgain: 'PLAY AGAIN',
    contact: '📧 Contact',
    copied: '✅ Email copied',
    ratings: [
      { min: 0, max: 50, emoji: '🦥', label: 'Sloth', taunt: 'That\'s it? Your friends average 95. Are you sure those are fingers?' },
      { min: 51, max: 80, emoji: '🧑', label: 'Average', taunt: 'Not bad, but your friends average 95. Try again?' },
      { min: 81, max: 100, emoji: '✋', label: 'Nice Speed', taunt: 'Good job! But esports players are on another level' },
      { min: 101, max: 130, emoji: '🎮', label: 'Esports Player', taunt: 'Your friends average 95? You just crushed them!' },
      { min: 131, max: 999, emoji: '🐦', label: 'Woodpecker?!', taunt: 'That speed... are you sure you\'re not using a vibration motor?' }
    ]
  }
};

let currentLang = localStorage.getItem('clickgame-lang') || (navigator.language.startsWith('zh') ? 'zh' : 'en');

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('clickgame-lang', lang);
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  // 更新所有带 data-zh/data-en 的元素
  document.querySelectorAll('[data-zh]').forEach(el => {
    el.textContent = el.getAttribute(`data-${lang}`);
  });
  // 更新页面标题
  document.title = lang === 'zh' ? 'Click or Die - 连点器挑战' : 'Click or Die - Click Challenge';
}

// ===== 游戏状态 =====
let clickCount = 0;
let timeLeft = 10;
let isPlaying = false;
let timerInterval = null;
let clickTimestamps = [];

// ===== DOM =====
const timerEl = document.getElementById('timer');
const counterEl = document.getElementById('counter');
const clickBtn = document.getElementById('clickBtn');
const startBtn = document.getElementById('startBtn');
const resultOverlay = document.getElementById('resultOverlay');
const resultScore = document.getElementById('resultScore');
const resultRating = document.getElementById('resultRating');
const resultLabel = document.getElementById('resultLabel');
const resultTaunt = document.getElementById('resultTaunt');
const screenFlash = document.getElementById('screenFlash');

// ===== 粒子系统 =====
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animFrameId = null;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor(x, y, color, type = 'burst') {
    this.x = x;
    this.y = y;
    this.color = color;
    this.type = type;
    this.size = type === 'firework' ? Math.random() * 4 + 2 : Math.random() * 6 + 3;
    this.life = 1;
    this.decay = type === 'firework' ? Math.random() * 0.015 + 0.01 : Math.random() * 0.02 + 0.02;
    const angle = Math.random() * Math.PI * 2;
    const speed = type === 'firework' ? Math.random() * 3 + 1 : Math.random() * 8 + 4;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.gravity = type === 'firework' ? 0.02 : 0.15;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.2;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.99;
    this.life -= this.decay;
    this.rotation += this.rotSpeed;
    if (this.type === 'burst') {
      this.size *= 0.98;
    }
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.fillStyle = this.color;
    if (this.type === 'firework') {
      ctx.beginPath();
      ctx.arc(0, 0, this.size, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // 碎片形状
      const s = this.size;
      ctx.fillRect(-s/2, -s/2, s, s);
    }
    ctx.restore();
  }
}

function getRainbowColor() {
  const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#01a3a4', '#ff6348', '#7bed9f', '#70a1ff'];
  return colors[Math.floor(Math.random() * colors.length)];
}

function spawnBurst(x, y) {
  const count = 8 + Math.floor(Math.random() * 6);
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, getRainbowColor(), 'burst'));
  }
}

function spawnFirework() {
  const x = Math.random() * canvas.width;
  const y = Math.random() * canvas.height * 0.6;
  const count = 40 + Math.floor(Math.random() * 30);
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, getRainbowColor(), 'firework'));
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  if (particles.length > 0) {
    animFrameId = requestAnimationFrame(animateParticles);
  } else {
    animFrameId = null;
  }
}

function ensureAnimation() {
  if (!animFrameId) {
    animFrameId = requestAnimationFrame(animateParticles);
  }
}

// ===== 点击处理 =====
function handleClick(e) {
  if (!isPlaying) return;

  clickCount++;
  clickTimestamps.push(Date.now());

  // 更新计数器
  counterEl.textContent = clickCount;
  counterEl.classList.add('bump');
  setTimeout(() => counterEl.classList.remove('bump'), 100);

  // 按钮挤压
  clickBtn.classList.add('pressed');
  setTimeout(() => clickBtn.classList.remove('pressed'), 100);

  // 粒子爆发（从按钮中心）
  const rect = clickBtn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  spawnBurst(cx, cy);
  ensureAnimation();

  // 根据点击频率震动屏幕
  applyShake();
}

function applyShake() {
  // 计算最近1秒的点击频率
  const now = Date.now();
  clickTimestamps = clickTimestamps.filter(t => now - t < 1000);
  const freq = clickTimestamps.length;

  document.body.classList.remove('shake-light', 'shake-medium', 'shake-heavy');
  // 强制回流
  void document.body.offsetWidth;

  if (freq > 10) {
    document.body.classList.add('shake-heavy');
  } else if (freq > 5) {
    document.body.classList.add('shake-medium');
  } else if (freq > 2) {
    document.body.classList.add('shake-light');
  }

  setTimeout(() => {
    document.body.classList.remove('shake-light', 'shake-medium', 'shake-heavy');
  }, 150);
}

// ===== 游戏流程 =====
function startGame() {
  clickCount = 0;
  timeLeft = 10;
  isPlaying = true;
  clickTimestamps = [];

  counterEl.textContent = '0';
  timerEl.textContent = '10';
  timerEl.classList.remove('danger');
  screenFlash.classList.remove('active');
  resultOverlay.classList.remove('show');
  startBtn.style.display = 'none';
  clickBtn.disabled = false;
  clickBtn.querySelector('span').textContent = '';

  timerInterval = setInterval(() => {
    timeLeft--;
    timerEl.textContent = timeLeft;

    // 最后3秒红色闪烁
    if (timeLeft <= 3 && timeLeft > 0) {
      timerEl.classList.add('danger');
      screenFlash.classList.add('active');
    }

    if (timeLeft <= 0) {
      endGame();
    }
  }, 1000);
}

function endGame() {
  isPlaying = false;
  clearInterval(timerInterval);
  clickBtn.disabled = true;
  screenFlash.classList.remove('active');
  clickBtn.querySelector('span').textContent = currentLang === 'zh' ? '结束' : 'TIME UP';

  // 延迟显示结果
  setTimeout(() => {
    showResult();
  }, 500);
}

function showResult() {
  const lang = translations[currentLang];
  const ratings = lang.ratings;
  const rating = ratings.find(r => clickCount >= r.min && clickCount <= r.max);

  resultScore.textContent = clickCount;
  resultRating.textContent = rating.emoji;
  resultLabel.textContent = rating.label;
  resultTaunt.textContent = rating.taunt;
  resultOverlay.classList.add('show');

  // 烟花效果
  let fireworkCount = 0;
  const fwInterval = setInterval(() => {
    spawnFirework();
    ensureAnimation();
    fireworkCount++;
    if (fireworkCount > 8) clearInterval(fwInterval);
  }, 300);
}

function resetGame() {
  resultOverlay.classList.remove('show');
  clickCount = 0;
  timeLeft = 10;
  counterEl.textContent = '0';
  timerEl.textContent = '10';
  timerEl.classList.remove('danger');
  startBtn.style.display = '';
  clickBtn.disabled = true;
  clickBtn.querySelector('span').textContent = currentLang === 'zh' ? '点击开始' : 'CLICK TO START';
  particles = [];
}

// ===== 反馈按钮 =====
function copyEmail() {
  const email = 'littlet31@foxmail.com';
  navigator.clipboard.writeText(email).then(() => {
    const btn = document.querySelector('.feedback-link');
    btn.textContent = currentLang === 'zh' ? '✅ 已复制邮箱地址' : '✅ Email copied';
    setTimeout(() => {
      btn.textContent = currentLang === 'zh' ? '📧 联系我' : '📧 Contact';
    }, 1500);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = email;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.querySelector('.feedback-link');
    btn.textContent = currentLang === 'zh' ? '✅ 已复制邮箱地址' : '✅ Email copied';
    setTimeout(() => {
      btn.textContent = currentLang === 'zh' ? '📧 联系我' : '📧 Contact';
    }, 1500);
  });
}

// ===== 初始化 =====
setLang(currentLang);

// 支持键盘空格点击
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && isPlaying) {
    e.preventDefault();
    handleClick(e);
  }
});
</script>
</body>
</html>
